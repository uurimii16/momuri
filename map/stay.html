<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체류형 플래너 · 머무리</title>
  <link href="https://tile.routo.com/webgis_tile01/TEST/gljs-qa/20241205/developers/web_gl_js/routo-gl.css" rel="stylesheet">
  <script src="https://stg-api.routo.com/v3/maps/map?key=c914fb43-0d44-4fa7-838a-84619e3486c3"></script>
  <style>
    :root{ --brand:#14b8a6; --brand-d:#0f766e; --amber:#f59e0b; --blue:#2e79c4; --violet:#7c5cff;
           --ink:#26343a; --muted:#6b7684; --line:#e7ebec; --soft:#f5f8f7; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Pretendard',-apple-system,sans-serif; color:var(--ink); }
    .nav{ height:56px; background:#fff; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:22px; padding:0 24px; }
    .brand{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:18px; color:var(--brand-d); text-decoration:none; }
    .nav a{ color:var(--muted); text-decoration:none; font-size:14px; }
    .nav a.active,.nav a:hover{ color:var(--brand-d); }
    .spacer{ flex:1; }
    .kto{ font-size:11px; color:#94a0a8; }
    .kto b{ color:var(--brand-d); }
    #app{ display:flex; height:calc(100vh - 56px); }
    #side{ width:430px; background:var(--soft); overflow-y:auto; padding:20px 22px 48px; border-right:1px solid var(--line); }
    #map{ flex:1; }
    .chead h1{ font-size:20px; }
    .chead .sub{ font-size:12.5px; color:var(--muted); margin:6px 0 4px; line-height:1.5; }
    .rsel{ width:100%; margin:10px 0 4px; padding:8px 10px; border:1px solid var(--line); border-radius:9px; font-size:13.5px; background:#fff; color:var(--ink); }
    /* 체류 조건 */
    .cond{ margin:14px 0 6px; }
    .cond .lb{ font-size:11.5px; color:var(--muted); font-weight:700; margin-bottom:6px; }
    .seg{ display:flex; gap:6px; background:#eef1f2; border-radius:10px; padding:4px; }
    .seg button{ flex:1; border:none; background:none; padding:8px 4px; border-radius:8px; font-size:12.5px; font-weight:700; color:var(--muted); cursor:pointer; }
    .seg button.on{ background:#fff; color:var(--brand-d); box-shadow:0 1px 4px rgba(0,0,0,.1); }
    .summary{ display:flex; gap:8px; margin:14px 0 6px; }
    .summary div{ flex:1; background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px 6px; text-align:center; font-size:11px; color:var(--muted); }
    .summary b{ display:block; font-size:15px; color:var(--ink); margin-top:2px; }
    /* Day 탭 */
    .days{ display:flex; gap:6px; margin:14px 0 12px; flex-wrap:wrap; }
    .days button{ border:1px solid var(--line); background:#fff; padding:7px 14px; border-radius:20px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; }
    .days button.on{ background:var(--brand); color:#fff; border-color:var(--brand); }
    /* 섹션 카드 */
    .sec{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 15px; margin:14px 0; }
    .sec > h3{ font-size:13.5px; color:var(--brand-d); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .sec .hint{ font-size:11.5px; color:var(--muted); line-height:1.5; margin-bottom:10px; }
    /* 타임라인 */
    .stop{ display:flex; gap:12px; }
    .stop .rail{ display:flex; flex-direction:column; align-items:center; width:34px; flex:none; }
    .dot{ width:30px; height:30px; border-radius:50%; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex:none; box-shadow:0 2px 6px rgba(0,0,0,.15); }
    .dot.명소{ background:var(--blue); } .dot.맛집{ background:var(--amber); } .dot.숙박{ background:var(--violet); }
    .line{ width:2px; flex:1; background:#cfd8d6; min-height:18px; margin:2px 0; }
    .stop .body{ flex:1; padding-bottom:6px; }
    .stop .time{ font-size:12px; color:var(--brand-d); font-weight:700; font-variant-numeric:tabular-nums; }
    .stop .name{ font-size:15px; font-weight:700; margin:1px 0 2px; }
    .stop .name .kind{ font-size:10px; font-weight:700; color:#fff; padding:1px 7px; border-radius:20px; margin-left:6px; vertical-align:middle; }
    .kind.명소{ background:var(--blue); } .kind.맛집{ background:var(--amber); } .kind.숙박{ background:var(--violet); }
    .stop .addr{ font-size:11.5px; color:var(--muted); line-height:1.4; }
    .stop .stay{ font-size:11.5px; color:#8a949a; margin-top:3px; }
    .stop img{ width:100%; height:110px; object-fit:cover; border-radius:10px; margin-top:8px; background:#e6ebe9; }
    .leg{ display:flex; gap:12px; }
    .leg .rail{ width:34px; flex:none; display:flex; justify-content:center; }
    .leg .rail .line{ width:2px; background:#cfd8d6; }
    .leg .info{ flex:1; padding:5px 0; }
    .leg .pill{ display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--line); border-radius:20px; padding:4px 11px; font-size:12px; color:#48555b; }
    .leg .pill b{ color:var(--ink); }
    /* 일자리 */
    .signal{ display:flex; gap:8px; margin-bottom:12px; }
    .signal div{ flex:1; background:var(--soft); border-radius:9px; padding:8px 6px; text-align:center; font-size:10.5px; color:var(--muted); }
    .signal b{ display:block; font-size:14px; margin-top:2px; color:var(--ink); }
    .signal b.warn{ color:#d9534f; }
    .btnrow{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
    .lnk{ flex:1; min-width:130px; text-align:center; text-decoration:none; font-size:12.5px; font-weight:700; padding:9px 8px; border-radius:9px; border:1px solid var(--line); color:var(--brand-d); background:var(--soft); }
    .lnk.p{ background:var(--brand); color:#fff; border-color:var(--brand); }
    .job{ border:1px solid var(--line); border-radius:10px; padding:9px 11px; margin-top:8px; }
    .job .tt{ font-size:13px; font-weight:700; line-height:1.35; }
    .job .inst{ font-size:11.5px; color:var(--brand-d); margin:2px 0; }
    .job .meta{ font-size:11px; color:var(--muted); line-height:1.6; }
    .job .tag{ display:inline-block; background:var(--soft); border-radius:6px; padding:1px 7px; margin:2px 4px 0 0; font-size:10.5px; color:#5a666c; }
    .job .go{ font-size:11.5px; color:var(--blue); text-decoration:none; }
    .badge-local{ font-size:10px; background:#e7f6f2; color:var(--brand-d); border-radius:6px; padding:1px 6px; font-weight:700; }
    .empty{ font-size:12px; color:var(--muted); padding:8px 2px; }
    /* 숙소 카드 */
    .stay-card{ display:flex; gap:10px; border:1px solid var(--line); border-radius:10px; padding:8px; margin-top:8px; }
    .stay-card img{ width:74px; height:64px; object-fit:cover; border-radius:8px; background:#e6ebe9; flex:none; }
    .stay-card .t{ font-size:13px; font-weight:700; }
    .stay-card .a{ font-size:11px; color:var(--muted); line-height:1.4; margin-top:2px; }
    /* 생활인구 스토리 */
    .story{ background:linear-gradient(135deg,#0f766e,#14b8a6); color:#eafaf6; border:none; }
    .story h3{ color:#fff; }
    .story p{ font-size:12.5px; line-height:1.65; }
    .story .kpi{ display:flex; gap:8px; margin:10px 0 4px; }
    .story .kpi div{ flex:1; background:rgba(255,255,255,.14); border-radius:9px; padding:8px 6px; text-align:center; font-size:10.5px; }
    .story .kpi b{ display:block; font-size:15px; color:#fff; margin-top:2px; }
    .nm{ width:28px; height:28px; border-radius:50%; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.35); border:2px solid #fff; }
    @media(max-width:820px){ #side{ width:340px; } }
  </style>
</head>
<body>
  <div class="nav">
    <a class="brand" href="../index.html"><svg width="24" height="24" viewBox="0 0 32 32" fill="none"><path d="M16 3c-5.5 0-10 4.3-10 10 0 7.2 10 16 10 16s10-8.8 10-16c0-5.7-4.5-10-10-10z" fill="#14b8a6"/><path d="M16 9l6 5v7h-3.9v-4.4h-4.2V21H10v-7z" fill="#fff"/></svg>머무리</a>
    <a href="../index.html">홈</a>
    <a href="momuri.html">숨은 매력지</a>
    <a href="course.html">하루 코스</a>
    <a href="stay.html" class="active">체류 플래너</a>
    <a href="decline-map.html">쇠퇴지수 지도</a>
    <span class="spacer"></span>
    <span class="kto">데이터 · <b>한국관광공사 TourAPI</b> · 채용 잡알리오 · 경로 OSRM</span>
  </div>
  <div id="app">
    <aside id="side">
      <div class="chead">
        <h1>체류형 로컬 관광 플래너</h1>
        <p class="sub">문화유산으로 유입 → <b>며칠 머무는 코스 + 로컬 일자리·장기 숙소</b>로 워케이션·한달살기. 일회성 관광을 <b>생활인구</b>로 잇습니다.</p>
        <select class="rsel" id="rsel"></select>
      </div>

      <div class="cond">
        <div class="lb">체류 기간</div>
        <div class="seg" id="period">
          <button data-d="2">1박 2일</button>
          <button data-d="3">2박 3일</button>
          <button data-d="30" class="on">한 달 살기</button>
        </div>
      </div>

      <div class="summary" id="summary"></div>
      <div class="days" id="daytabs"></div>
      <div id="timeline"></div>

      <div class="sec" id="jobsSec"></div>
      <div class="sec" id="staySec"></div>
      <div class="sec story" id="storySec"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script>
    const COLOR = { '명소':'#2e79c4', '맛집':'#f59e0b', '숙박':'#7c5cff' };
    const START = 9*60 + 30;
    let map, courses = [], jobs = {}, regions = [], cur = 0, dayIdx = 0, period = 30, markers = [];

    const fmt = m => `${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    const esc = s => String(s ?? '').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const qparam = k => new URLSearchParams(location.search).get(k);
    const ymd = s => s && s.length===8 ? `${s.slice(4,6)}.${s.slice(6,8)}` : (s||'');

    map = new routogl.Map({ container:'map', style:routogl.RoutoStyle.LIGHT, center:[127.8,36.3], zoom:7 });

    map.on('load', async () => {
      [courses, jobs, regions] = await Promise.all([
        fetch('data/courses.json?v=2').then(r=>r.json()),
        fetch('data/jobs.json?v=1').then(r=>r.json()).catch(()=>({})),
        fetch('data/momuri.json?v=2').then(r=>r.json()).catch(()=>([])),
      ]);
      const want = qparam('region');
      const idx = courses.findIndex(c => c.sigungu === want || c.region === want);
      cur = idx >= 0 ? idx : 0;
      const sel = document.getElementById('rsel');
      sel.innerHTML = courses.map((c,i)=>`<option value="${i}">${esc(c.region)} · ${esc(c.theme)}</option>`).join('');
      sel.value = cur;
      sel.onchange = e => { cur = +e.target.value; dayIdx = 0; render(); };
      document.querySelectorAll('#period button').forEach(b => b.onclick = () => {
        period = +b.dataset.d;
        document.querySelectorAll('#period button').forEach(x=>x.classList.toggle('on', x===b));
        dayIdx = 0; render();
      });
      render();
    });

    // 이 기간에서 계획에 넣을 '실제 데이터가 있는' 날 수 (데모 코스 상한 내)
    const planDays = c => Math.min(c.days.length, period <= 3 ? period - 0 : c.days.length);

    function render(){
      const c = courses[cur];
      const nd = planDays(c);
      if(dayIdx >= nd) dayIdx = 0;
      const region = regions.find(r => r.sigungu === c.sigungu) || {};
      const job = jobs[c.sigungu] || null;

      // 요약
      const stayNights = period===30 ? '한 달+' : (nd-1)+'박';
      const carTot = c.days.slice(0,nd).reduce((s,d)=>s+d.car_total_min,0);
      document.getElementById('summary').innerHTML =
        `<div>체류<b>${stayNights}</b></div>`+
        `<div>코스<b>${nd}일</b></div>`+
        `<div>이동 총<b>${carTot}분</b></div>`;

      // Day 탭
      const dt = document.getElementById('daytabs');
      dt.innerHTML = c.days.slice(0,nd).map((d,i)=>
        `<button class="${i===dayIdx?'on':''}" data-i="${i}">Day ${d.day}</button>`).join('')
        + (period===30 ? `<button style="cursor:default;color:#9aa4aa;border-style:dashed">…이후 반복+정착</button>` : '');
      dt.querySelectorAll('button[data-i]').forEach(b=> b.onclick=()=>{ dayIdx=+b.dataset.i; render(); });

      renderTimeline(c.days[dayIdx]);
      renderJobs(job, c, region);
      renderStays(region);
      renderStory(c, region, nd);
      drawMap(c.days[dayIdx]);
    }

    function renderTimeline(day){
      let t = START, html = '';
      const legs = day.legs;
      day.stops.forEach((s,i)=>{
        const arrive=t, depart=t+s.stay;
        html += `<div class="stop">
          <div class="rail"><div class="dot ${s.kind}">${i+1}</div><div class="line"></div></div>
          <div class="body">
            <div class="time">${fmt(arrive)} – ${fmt(depart)}</div>
            <div class="name">${esc(s.name)}<span class="kind ${s.kind}">${s.kind}</span></div>
            ${s.addr?`<div class="addr">${esc(s.addr)}</div>`:''}
            <div class="stay">⏱ 머무름 ${s.stay}분</div>
            ${s.img?`<img src="${esc(s.img)}" onerror="this.style.display='none'">`:''}
          </div></div>`;
        if(i < legs.length){
          const m = legs[i].car.min;
          html += `<div class="leg"><div class="rail"><div class="line"></div></div><div class="info"><span class="pill">🚗 <b>${m}분</b> · ${legs[i].car.km}km${legs[i].car.estimated?' (추정)':''}</span></div></div>`;
          t = depart + m;
        }
      });
      // 야간 숙소
      if(day.night){
        if(day.to_night){
          const m = day.to_night.car.min;
          html += `<div class="leg"><div class="rail"><div class="line"></div></div><div class="info"><span class="pill">🚗 <b>${m}분</b> · 숙소로 이동</span></div></div>`;
        }
        const n = day.night;
        html += `<div class="stop">
          <div class="rail"><div class="dot 숙박">🏠</div></div>
          <div class="body">
            <div class="time">야간 · 체류</div>
            <div class="name">${esc(n.name)}<span class="kind 숙박">숙박</span></div>
            ${n.addr?`<div class="addr">${esc(n.addr)}</div>`:''}
            <div class="stay">🌙 이 지역에서 하룻밤 — 다음날 로컬 탐색</div>
            ${n.img?`<img src="${esc(n.img)}" onerror="this.style.display='none'">`:''}
          </div></div>`;
      } else {
        html += `<div class="stop"><div class="rail"><div class="dot 숙박">🏠</div></div>
          <div class="body"><div class="name">체크아웃 · 귀가</div>
          <div class="stay">이 지역은 등록 숙소가 적어요 — 아래 장기 숙소·인근 검색을 참고하세요.</div></div></div>`;
      }
      document.getElementById('timeline').innerHTML = html;
    }

    function jobCard(j, local){
      const tags = [j.hire, j.recruitSe].filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join('');
      const ncs = j.ncs ? `<span class="tag">${esc(String(j.ncs).split(',')[0])}</span>` : '';
      return `<div class="job">
        <div class="tt">${local?'<span class="badge-local">로컬</span> ':''}${esc(j.title)}</div>
        <div class="inst">${esc(j.inst)}</div>
        <div class="meta">${esc(j.rgn||'')} · 채용 ${j.nope||'-'}명 · ~${ymd(j.end)} 마감</div>
        <div>${ncs}${tags}</div>
        ${j.url?`<a class="go" href="${esc(j.url)}" target="_blank" rel="noopener">공고 보기 →</a>`:''}
      </div>`;
    }

    function renderJobs(job, c, region){
      const sec = document.getElementById('jobsSec');
      const ax = region.axes || {};
      const connect = ax.connect ?? 0;
      const outflow = connect < 0;   // 연결성 음수 = 청년 순유출 신호(프록시)
      const local = (job && job.local) || [];
      const sido = (job && job.sido_jobs) || [];
      const wknet = `https://www.work24.go.kr/wk/a/b/1200/retriveDtlEmpSrchList.do?searchClcd=&keyword=${encodeURIComponent(c.sigungu)}`;
      let html = `<h3>💼 로컬 일자리 · 워케이션</h3>
        <div class="hint">장기 체류라면 <b>지역에서 일하며 머무는 것</b>이 핵심. 인력난 지표·실물 채용 딥링크·공공기관 공고를 함께 봅니다.</div>
        <div class="signal">
          <div>문화유산<b>${region.heritage ?? '-'}건</b></div>
          <div>방문 잠재<b>${ax.visit ?? '-'}</b></div>
          <div>청년 유출 신호<b class="${outflow?'warn':''}">${outflow?'있음':'낮음'}</b></div>
        </div>
        <div class="btnrow">
          <a class="lnk p" href="${wknet}" target="_blank" rel="noopener">이 지역 채용 보기 (고용24)</a>
          ${job?`<a class="lnk" href="${esc(job.deeplink)}" target="_blank" rel="noopener">공공기관 채용 (잡알리오)</a>`:''}
        </div>`;
      if(local.length){
        html += `<div class="hint" style="margin:12px 0 0">🎯 <b>지역 밀착 공고</b>(시군구 매칭)</div>` + local.slice(0,3).map(j=>jobCard(j,true)).join('');
      }
      if(sido.length){
        html += `<div class="hint" style="margin:12px 0 0">🏛 인근(시·도) 공공기관 공고</div>` + sido.slice(0,3).map(j=>jobCard(j,false)).join('');
      }
      if(!local.length && !sido.length){
        html += `<div class="empty">현재 진행 중인 공공기관 공고가 없어요. 위 딥링크에서 지역 중소기업 채용을 확인하세요.</div>`;
      }
      html += `<div class="hint" style="margin-top:10px;font-size:10.5px">※ 지방 중소기업 실물 채용은 딥링크로, 신뢰성 있는 공공기관 채용은 공식 API(잡알리오)로 제공합니다. 구인배수 등 인력난 지표는 KOSIS 연동 예정.</div>`;
      sec.innerHTML = html;
    }

    function renderStays(region){
      const sec = document.getElementById('staySec');
      const stays = (region.stays || []);
      let html = `<h3>🏡 장기 숙소</h3>
        <div class="hint">한달살기·워케이션용 숙소(게스트하우스·펜션 등). 장기 투숙은 숙소에 직접 문의를 권장합니다.</div>`;
      if(stays.length){
        html += stays.slice(0,4).map(s=>`<div class="stay-card">
          ${s.img?`<img src="${esc(s.img)}" onerror="this.style.display='none'">`:'<img>'}
          <div><div class="t">${esc(s.title)}</div><div class="a">${esc(s.addr||'')}</div></div>
        </div>`).join('');
      } else {
        html += `<div class="empty">등록된 숙소가 적은 지역이에요. 인근 시·군 숙소 또는 지자체 한달살기 프로그램을 활용하세요.</div>`;
      }
      sec.innerHTML = html;
    }

    function renderStory(c, region, nd){
      const sec = document.getElementById('storySec');
      const ax = region.axes || {};
      const nights = period===30 ? 27 : (nd-1);
      const est = nights * 1;   // 1인 체류 → 체류일수만큼 생활인구 기여(데모 단순화)
      sec.innerHTML = `<h3>🌱 머물면 생기는 것 — 생활인구</h3>
        <p>${esc(c.region)}은(는) 문화유산 ${region.heritage ?? '-'}건의 매력에도 방문이 <b>하루에 그치기 쉬운</b> 곳이에요. 며칠 머물면 관광객이 아니라 <b>생활인구</b>가 됩니다 — 지역 상권·숙박·일자리에 실제 소비가 남습니다.</p>
        <div class="kpi">
          <div>쇠퇴지수<b>${region.composite ?? '-'}</b></div>
          <div>이번 체류<b>${period===30?'한 달+':(nd)+'일'}</b></div>
          <div>생활인구 기여<b>+${est}일</b></div>
        </div>
        <p style="font-size:11px;opacity:.85;margin-top:6px">#체류형관광 #워케이션 #한달살기 #2030청년 #로컬일자리 #생활인구</p>`;
    }

    function drawMap(day){
      markers.forEach(m=>m.remove()); markers = [];
      let path = day.legs.flatMap(l => l.car.path);
      if(day.to_night) path = path.concat(day.to_night.car.path);
      const gj = { type:'Feature', geometry:{ type:'LineString', coordinates:path } };
      if(map.getSource('route')) map.getSource('route').setData(gj);
      else {
        map.addSource('route',{ type:'geojson', data:gj });
        map.addLayer({ id:'route-line', type:'line', source:'route',
          paint:{ 'line-color':'#14b8a6','line-width':4,'line-opacity':0.85 },
          layout:{ 'line-cap':'round','line-join':'round' }});
      }
      const pts = [];
      day.stops.forEach((s,i)=>{
        const el = document.createElement('div');
        el.className='nm'; el.style.background=COLOR[s.kind];
        el.innerHTML=`<span>${i+1}</span>`;
        markers.push(new routogl.Marker({ element:el }).setLngLat([s.lng,s.lat]).addTo(map));
        pts.push([s.lng,s.lat]);
      });
      if(day.night){
        const el = document.createElement('div');
        el.className='nm'; el.style.background=COLOR['숙박']; el.style.fontSize='14px';
        el.innerHTML='🏠';
        markers.push(new routogl.Marker({ element:el }).setLngLat([day.night.lng,day.night.lat]).addTo(map));
        pts.push([day.night.lng,day.night.lat]);
      }
      const lngs = pts.map(p=>p[0]), lats = pts.map(p=>p[1]);
      map.fitBounds([[Math.min(...lngs),Math.min(...lats)],[Math.max(...lngs),Math.max(...lats)]],
        { padding:70, duration:800, maxZoom:13 });
    }
  </script>
</body>
</html>

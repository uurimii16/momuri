<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>머무리 · 숨은 매력지 (Phase 1 데모)</title>
  <link href="https://tile.routo.com/webgis_tile01/TEST/gljs-qa/20241205/developers/web_gl_js/routo-gl.css" rel="stylesheet">
  <script src="https://stg-api.routo.com/v3/maps/map?key=c914fb43-0d44-4fa7-838a-84619e3486c3"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; color: #1b1b1f; }
    #app { display: flex; height: 100vh; }
    #side { width: 360px; background: #f7f6f3; overflow-y: auto; padding: 20px; border-right: 1px solid #e5e3dd; }
    #side h1 { font-size: 22px; }
    #side .sub { font-size: 12px; color: #6b6b70; margin: 4px 0 16px; line-height: 1.5; }
    .card { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 13px 14px; margin-bottom: 10px; cursor: pointer; transition: .15s; }
    .card:hover, .card.active { border-color: #b8860b; box-shadow: 0 3px 12px rgba(184,134,11,.15); }
    .card .rank { font-size: 11px; color: #b8860b; font-weight: 700; }
    .card .name { font-size: 16px; font-weight: 700; margin: 2px 0 6px; }
    .card .meta { font-size: 12px; color: #555; }
    .card .bars { display: flex; gap: 4px; margin-top: 8px; }
    .bar { flex: 1; text-align: center; font-size: 10px; color: #888; }
    .bar b { display: block; font-size: 13px; color: #333; }
    #detail { position: absolute; right: 16px; top: 16px; width: 320px; max-height: calc(100vh - 32px); overflow-y: auto; background: #fff; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,.18); padding: 18px; display: none; }
    #detail h2 { font-size: 19px; }
    #detail .tag { display: inline-block; font-size: 11px; background: #fbeecb; color: #8a6d1a; padding: 3px 8px; border-radius: 20px; margin: 6px 0; }
    #detail h3 { font-size: 13px; margin: 14px 0 6px; color: #b8860b; }
    #detail ul { list-style: none; }
    #detail li { font-size: 13px; padding: 5px 0; border-bottom: 1px solid #f0efea; }
    #detail .close { float: right; cursor: pointer; color: #999; font-size: 20px; }
    #map { flex: 1; }
    .idx { display:flex; gap:6px; margin-top:10px; }
    .idx div { flex:1; background:#faf9f6; border-radius:8px; padding:6px; text-align:center; font-size:10px; color:#888; }
    .idx b { display:block; font-size:14px; color:#c0392b; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="side">
      <h1>머무리 <span style="font-size:12px;color:#b8860b;">숨은 매력지</span></h1>
      <p class="sub">복합 관광쇠퇴지수 × 문화유산 밀도로 뽑은 <b>“살릴 자원은 있는데 소외된”</b> 소도시. 카드를 누르면 한국관광공사 TourAPI 실제 관광 콘텐츠가 지도에 표시됩니다.</p>
      <div id="list"></div>
    </aside>
    <div id="map"></div>
  </div>
  <section id="detail"></section>

  <script>
    const map = new routogl.Map({ container: 'map', style: routogl.RoutoStyle.LIGHT, center: [127.7, 36.3], zoom: 7 });
    const listEl = document.getElementById('list');
    const detailEl = document.getElementById('detail');
    let regions = [], regionMarkers = [], stopMarkers = [];

    map.on('load', async () => {
      regions = await (await fetch(`data/momuri.json?v=${Date.now()}`, { cache: 'no-store' })).json();
      renderList();
      regions.forEach((r, i) => {
        const m = new routogl.Marker({ color: '#b8860b' }).setLngLat([r.lng, r.lat]).addTo(map);
        m.getElement().style.cursor = 'pointer';
        m.getElement().addEventListener('click', () => selectRegion(i));
        regionMarkers.push(m);
      });
    });

    function renderList() {
      listEl.innerHTML = regions.map((r, i) => `
        <div class="card" data-i="${i}">
          <div class="rank">#${i + 1} · ${r.theme}</div>
          <div class="name">${r.region}</div>
          <div class="meta">문화유산 ${r.heritage}건 · 관광지 ${r.spots.length} · 맛집 ${r.foods.length}</div>
          <div class="bars">
            <div class="bar">쇠퇴<b>${r.composite}</b></div>
            <div class="bar">숨은점수<b>${r.hidden_score}</b></div>
          </div>
        </div>`).join('');
      listEl.querySelectorAll('.card').forEach(c =>
        c.addEventListener('click', () => selectRegion(+c.dataset.i)));
    }

    function selectRegion(i) {
      const r = regions[i];
      document.querySelectorAll('.card').forEach((c, j) => c.classList.toggle('active', j === i));
      stopMarkers.forEach(m => m.remove()); stopMarkers = [];
      const stops = [...r.spots.map(s => ({ ...s, kind: '관광' })), ...r.foods.map(s => ({ ...s, kind: '맛집' }))];
      stops.forEach(s => {
        const m = new routogl.Marker({ color: s.kind === '맛집' ? '#e67e22' : '#2e6db4' })
          .setLngLat([s.lng, s.lat]).addTo(map);
        stopMarkers.push(m);
      });
      map.flyTo({ center: [r.lng, r.lat], zoom: 11, duration: 900 });
      detailEl.style.display = 'block';
      detailEl.innerHTML = `
        <span class="close" onclick="document.getElementById('detail').style.display='none'">×</span>
        <h2>${r.region}</h2>
        <div class="tag">${r.segment}</div>
        <div class="idx">
          <div>방문쇠퇴<b>${r.axes.visit}</b></div>
          <div>매력쇠퇴<b>${r.axes.attract}</b></div>
          <div>연결소외<b>${r.axes.connect}</b></div>
        </div>
        <h3>관광지 (TourAPI)</h3>
        <ul>${r.spots.map(s => `<li>${s.title}</li>`).join('')}</ul>
        <h3>맛집 (TourAPI)</h3>
        <ul>${r.foods.map(s => `<li>${s.title}</li>`).join('')}</ul>`;
    }
  </script>
</body>
</html>

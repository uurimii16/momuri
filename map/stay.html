<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>체류형 플래너 · 머무리</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    :root{ --brand:#14b8a6; --brand-d:#0f766e; --amber:#f59e0b; --blue:#2e79c4; --violet:#7c5cff;
           --ink:#26343a; --muted:#6b7684; --line:#e7ebec; --soft:#f5f8f7; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Pretendard',-apple-system,sans-serif; color:var(--ink); }
    .nav{ height:56px; background:#fff; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:22px; padding:0 24px; }
    .brand{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:18px; color:var(--brand-d); text-decoration:none; }
    .nav a{ color:var(--muted); text-decoration:none; font-size:14px; }
    .nav a.active,.nav a:hover{ color:var(--brand-d); }
    .spacer{ flex:1; }
    .kto{ font-size:11px; color:#94a0a8; }
    .kto b{ color:var(--brand-d); }
    #app{ display:flex; height:calc(100vh - 56px); }
    #side{ width:430px; background:var(--soft); overflow-y:auto; padding:20px 22px 48px; border-right:1px solid var(--line); }
    #map{ flex:1; }
    .chead h1{ font-size:20px; }
    .chead .sub{ font-size:12.5px; color:var(--muted); margin:6px 0 4px; line-height:1.5; }
    .rsel{ width:100%; margin:10px 0 4px; padding:8px 10px; border:1px solid var(--line); border-radius:9px; font-size:13.5px; background:#fff; color:var(--ink); }
    /* 체류 조건 */
    .cond{ margin:14px 0 6px; }
    .cond .lb{ font-size:11.5px; color:var(--muted); font-weight:700; margin-bottom:6px; }
    .seg{ display:flex; gap:6px; background:#eef1f2; border-radius:10px; padding:4px; }
    .seg button{ flex:1; border:none; background:none; padding:8px 4px; border-radius:8px; font-size:12.5px; font-weight:700; color:var(--muted); cursor:pointer; }
    .seg button.on{ background:#fff; color:var(--brand-d); box-shadow:0 1px 4px rgba(0,0,0,.1); }
    .summary{ display:flex; gap:8px; margin:14px 0 6px; }
    .summary div{ flex:1; background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px 6px; text-align:center; font-size:11px; color:var(--muted); }
    .summary b{ display:block; font-size:15px; color:var(--ink); margin-top:2px; }
    /* Day 탭 */
    .days{ display:flex; gap:6px; margin:14px 0 12px; flex-wrap:wrap; }
    .days button{ border:1px solid var(--line); background:#fff; padding:7px 14px; border-radius:20px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; }
    .days button.on{ background:var(--brand); color:#fff; border-color:var(--brand); }
    /* 섹션 카드 */
    .sec{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 15px; margin:14px 0; }
    .sec > h3{ font-size:13.5px; color:var(--brand-d); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .sec .hint{ font-size:11.5px; color:var(--muted); line-height:1.5; margin-bottom:10px; }
    /* 타임라인 */
    .stop{ display:flex; gap:12px; }
    .stop .rail{ display:flex; flex-direction:column; align-items:center; width:34px; flex:none; }
    .dot{ width:30px; height:30px; border-radius:50%; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex:none; box-shadow:0 2px 6px rgba(0,0,0,.15); }
    .dot.명소{ background:var(--blue); } .dot.맛집{ background:var(--amber); } .dot.숙박{ background:var(--violet); }
    .line{ width:2px; flex:1; background:#cfd8d6; min-height:18px; margin:2px 0; }
    .stop .body{ flex:1; padding-bottom:6px; }
    .stop .time{ font-size:12px; color:var(--brand-d); font-weight:700; font-variant-numeric:tabular-nums; }
    .stop .name{ font-size:15px; font-weight:700; margin:1px 0 2px; }
    .stop .name .kind{ font-size:10px; font-weight:700; color:#fff; padding:1px 7px; border-radius:20px; margin-left:6px; vertical-align:middle; }
    .kind.명소{ background:var(--blue); } .kind.맛집{ background:var(--amber); } .kind.숙박{ background:var(--violet); }
    .stop .addr{ font-size:11.5px; color:var(--muted); line-height:1.4; }
    .stop .stay{ font-size:11.5px; color:#8a949a; margin-top:3px; }
    .stop img{ width:100%; height:110px; object-fit:cover; border-radius:10px; margin-top:8px; background:#e6ebe9; }
    .leg{ display:flex; gap:12px; }
    .leg .rail{ width:34px; flex:none; display:flex; justify-content:center; }
    .leg .rail .line{ width:2px; background:#cfd8d6; }
    .leg .info{ flex:1; padding:5px 0; }
    .leg .pill{ display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid var(--line); border-radius:20px; padding:4px 11px; font-size:12px; color:#48555b; }
    .leg .pill b{ color:var(--ink); }
    .leg .steps{ margin-top:6px; font-size:11.5px; color:#5a666c; line-height:1.7; }
    .leg .step{ display:inline-block; background:#eef4f2; border-radius:6px; padding:2px 7px; margin:2px 4px 2px 0; }
    .leg .step.버스{ background:#e7f0fa; color:#245b93; } .leg .step.지하철{ background:#fdeede; color:#9a5a12; }
    .leg .rec{ color:#b56a25; font-weight:700; }
    /* 이동수단 토글 */
    .modes{ display:flex; gap:6px; margin:12px 0 6px; background:#eef1f2; border-radius:10px; padding:4px; }
    .modes button{ flex:1; border:none; background:none; padding:8px; border-radius:8px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; }
    .modes button.on{ background:#fff; color:var(--brand-d); box-shadow:0 1px 4px rgba(0,0,0,.1); }
    .banner{ font-size:12px; background:#fff6f0; border-left:3px solid var(--amber); border-radius:7px; padding:8px 10px; margin:8px 0 4px; color:#7a5a3a; line-height:1.5; display:none; }
    /* 한 달 살기 로드맵 */
    .month .wk{ display:flex; gap:10px; padding:8px 0; border-bottom:1px solid #f0efea; }
    .month .wk:last-of-type{ border-bottom:none; }
    .month .wk .n{ width:50px; flex:none; font-weight:800; color:var(--brand-d); font-size:12.5px; }
    .month .wk .t{ font-size:13.5px; font-weight:700; }
    .month .wk .d{ font-size:12px; color:var(--muted); line-height:1.5; margin-top:1px; }
    .month .settle{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .month .settle a{ display:flex; align-items:center; justify-content:center; min-height:42px; text-align:center; text-decoration:none; font-size:12px; line-height:1.3; font-weight:700; padding:8px 8px; border-radius:9px; border:1px solid var(--line); color:var(--brand-d); background:var(--soft); word-break:keep-all; }
    /* 일자리 */
    .signal{ display:flex; gap:8px; margin-bottom:12px; }
    .signal div{ flex:1; background:var(--soft); border-radius:9px; padding:8px 6px; text-align:center; font-size:10.5px; color:var(--muted); }
    .signal b{ display:block; font-size:14px; margin-top:2px; color:var(--ink); }
    .signal b.warn{ color:#d9534f; }
    .btnrow{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
    .lnk{ flex:1; min-width:130px; text-align:center; text-decoration:none; font-size:12.5px; font-weight:700; padding:9px 8px; border-radius:9px; border:1px solid var(--line); color:var(--brand-d); background:var(--soft); }
    .lnk.p{ background:var(--brand); color:#fff; border-color:var(--brand); }
    .staytoggle{ width:100%; margin-top:10px; font-size:12.5px; font-weight:700; padding:9px 8px; border-radius:9px; border:1px solid #d9d4ff; color:#5b46d6; background:#eef0ff; cursor:pointer; }
    .staytoggle.on{ background:#7c5cff; color:#fff; border-color:#7c5cff; }
    .job{ border:1px solid var(--line); border-radius:10px; padding:9px 11px; margin-top:8px; }
    .job .tt{ font-size:13px; font-weight:700; line-height:1.35; }
    .job .inst{ font-size:11.5px; color:var(--brand-d); margin:2px 0; }
    .job .meta{ font-size:11px; color:var(--muted); line-height:1.6; }
    .job .tag{ display:inline-block; background:var(--soft); border-radius:6px; padding:1px 7px; margin:2px 4px 0 0; font-size:10.5px; color:#5a666c; }
    .job .go{ font-size:11.5px; color:var(--blue); text-decoration:none; }
    .badge-local{ font-size:10px; background:#e7f6f2; color:var(--brand-d); border-radius:6px; padding:1px 6px; font-weight:700; }
    .empty{ font-size:12px; color:var(--muted); padding:8px 2px; }
    /* 숙소 카드 */
    .stay-card{ display:flex; gap:10px; border:1px solid var(--line); border-radius:10px; padding:8px; margin-top:8px; }
    .stay-card img{ width:74px; height:64px; object-fit:cover; border-radius:8px; background:#e6ebe9; flex:none; }
    .stay-card .t{ font-size:13px; font-weight:700; }
    .stay-card .a{ font-size:11px; color:var(--muted); line-height:1.4; margin-top:2px; }
    /* 생활인구 스토리 */
    .story{ background:linear-gradient(135deg,#0f766e,#14b8a6); color:#eafaf6; border:none; }
    .story h3{ color:#fff; }
    .story p{ font-size:12.5px; line-height:1.65; }
    .story .kpi{ display:flex; gap:8px; margin:10px 0 4px; }
    .story .kpi div{ flex:1; background:rgba(255,255,255,.14); border-radius:9px; padding:8px 6px; text-align:center; font-size:10.5px; }
    .story .kpi b{ display:block; font-size:15px; color:#fff; margin-top:2px; }
    .nm{ width:28px; height:28px; border-radius:50%; color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,.35); border:2px solid #fff; }
    /* 한 달 살기 · 주차 뷰 */
    .wtabs{ display:flex; gap:6px; margin:12px 0 12px; flex-wrap:wrap; }
    .wtabs button{ border:1px solid var(--line); background:#fff; padding:8px 12px; border-radius:20px; font-size:12.5px; font-weight:700; color:var(--muted); cursor:pointer; }
    .wtabs button.on{ background:var(--brand); color:#fff; border-color:var(--brand); }
    .wk-head{ font-size:15px; font-weight:800; }
    .wk-desc{ font-size:12px; color:var(--muted); line-height:1.5; margin:2px 0 10px; }
    .cal{ display:flex; gap:4px; margin-bottom:6px; }
    .cal-legend{ font-size:10.5px; color:var(--muted); margin-bottom:8px; }
    .cal div{ flex:1; text-align:center; background:var(--soft); border-radius:8px; padding:6px 2px; font-size:10px; color:var(--muted); }
    .cal div b{ display:block; font-size:15px; margin-top:2px; }
    .cal div.wknd{ background:#eef6f3; color:var(--brand-d); }
    .rhythm{ font-size:11.5px; color:#5a666c; background:#f5f8f7; border-radius:8px; padding:8px 10px; margin-bottom:12px; line-height:1.5; }
    .picks{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .pick{ position:relative; border:1px solid var(--line); border-radius:10px; overflow:hidden; cursor:pointer; background:#fff; transition:.12s; }
    .pick:hover{ border-color:var(--brand); box-shadow:0 3px 12px rgba(20,184,166,.16); }
    .pnum{ position:absolute; top:6px; left:6px; width:21px; height:21px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; z-index:1; }
    .maplibregl-popup,.mapboxgl-popup,.routogl-popup{ z-index:10000 !important; }
    .pick img{ width:100%; height:76px; object-fit:cover; background:#e6ebe9; display:block; }
    .pick .pb{ padding:7px 8px 9px; }
    .pick .kd{ display:inline-block; font-size:9.5px; font-weight:800; color:#fff; border-radius:20px; padding:1px 7px; }
    .pick .pt{ font-size:12px; font-weight:700; margin-top:5px; line-height:1.3; }
    .cost .row{ display:flex; justify-content:space-between; align-items:center; font-size:12.5px; padding:6px 0; border-bottom:1px dashed #eee; }
    .cost .row b{ font-variant-numeric:tabular-nums; }
    .cost .row.tot{ border-bottom:none; font-weight:800; color:var(--brand-d); font-size:14.5px; padding-top:9px; }
    @media(max-width:820px){ #side{ width:340px; } }
  </style>
</head>
<body>
  <div class="nav">
    <a class="brand" href="../index.html"><svg width="24" height="24" viewBox="0 0 32 32" fill="none"><path d="M16 3c-5.5 0-10 4.3-10 10 0 7.2 10 16 10 16s10-8.8 10-16c0-5.7-4.5-10-10-10z" fill="#14b8a6"/><path d="M16 9l6 5v7h-3.9v-4.4h-4.2V21H10v-7z" fill="#fff"/></svg>머무리</a>
    <a href="../index.html">홈</a>
    <a href="momuri.html">숨은 매력지</a>
    <a href="course.html">하루 코스</a>
    <a href="stay.html" class="active">체류 플래너</a>
    <a href="decline-map.html">쇠퇴지수 지도</a>
    <span class="spacer"></span>
    <span class="kto">데이터 · <b>한국관광공사 TourAPI</b> · 채용 잡알리오 · 경로 OSRM</span>
  </div>
  <div id="app">
    <aside id="side">
      <div class="chead">
        <h1>체류형 로컬 관광 플래너</h1>
        <p class="sub">문화유산으로 유입 → <b>며칠 머무는 코스 + 로컬 일자리·장기 숙소</b>로 워케이션·한달살기. 일회성 관광을 <b>생활인구</b>로 잇습니다.</p>
        <select class="rsel" id="rsel"></select>
      </div>

      <div class="cond">
        <div class="lb">체류 기간</div>
        <div class="seg" id="period">
          <button data-d="2">1박 2일</button>
          <button data-d="3">2박 3일</button>
          <button data-d="30" class="on">한 달 살기</button>
        </div>
      </div>

      <div class="summary" id="summary"></div>
      <div class="modes" id="modes">
        <button data-m="car" class="on">🚗 자동차</button>
        <button data-m="transit">🚌 대중교통</button>
      </div>
      <div class="banner" id="banner"></div>
      <div class="days" id="daytabs"></div>
      <div id="timeline"></div>

      <div class="sec month" id="monthSec"></div>
      <div class="sec" id="settleSec"></div>
      <div class="sec" id="jobsSec"></div>
      <div class="sec" id="staySec"></div>
      <div class="sec story" id="storySec"></div>
    </aside>
    <div id="map"></div>
  </div>

  <script>
    const COLOR = { '명소':'#2e79c4', '맛집':'#f59e0b', '숙박':'#7c5cff' };
    const START = 9*60 + 30;
    let map, courses = [], jobs = {}, regions = [], cur = 0, dayIdx = 0, weekIdx = 0, weeks = [], period = 30, mode = 'car', markers = [];
    let stayMarkers = [], staysOn = false, curRegion = null, curStays = [];

    const fmt = m => `${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    const esc = s => String(s ?? '').replace(/</g,'&lt;').replace(/"/g,'&quot;');
    const qparam = k => new URLSearchParams(location.search).get(k);
    const ymd = s => s && s.length===8 ? `${s.slice(4,6)}.${s.slice(6,8)}` : (s||'');

    // ── 베이스맵: VWorld(국토교통부) 기본 + 실패 시 Carto 무키 폴백 자동 전환(tourgo와 동일) ──
    const VWORLD_KEY = 'C666A4B9-67F8-3D8B-BC1A-66CB6A90ADC3';
    const VW = (layer,ext) => `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/${layer}/{z}/{y}/{x}.${ext}`;
    const FALLBACK_TILES = ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png','https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'];
    const BASE_STYLE = { version:8, sources:{
      'vworld-base':{ type:'raster', tiles:[VW('Base','png')], tileSize:256, maxzoom:19, attribution:'© VWorld (국토교통부)' },
      'fallback-base':{ type:'raster', tiles:FALLBACK_TILES, tileSize:256, maxzoom:19, attribution:'© OpenStreetMap contributors © CARTO' }
    }, layers:[
      { id:'vworld-base', type:'raster', source:'vworld-base' },
      { id:'fallback-base', type:'raster', source:'fallback-base', layout:{ visibility:'none' } }
    ]};
    map = new maplibregl.Map({ container:'map', style:BASE_STYLE, center:[127.8,36.3], zoom:7 });
    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl(), 'bottom-right');
    // VWorld 타일 실패(에러 또는 4초 내 무타일) 시 Carto 폴백으로 자동 전환(tourgo와 동일)
    let basemapSwitched=false, vworldTileOk=false;
    function useFallbackBasemap(){
      if(basemapSwitched || !map.getLayer('fallback-base')) return;
      basemapSwitched=true;
      try{ map.setLayoutProperty('fallback-base','visibility','visible'); map.setLayoutProperty('vworld-base','visibility','none'); }catch(e){}
    }
    map.on('data', e=>{ if(e && e.sourceId==='vworld-base' && e.tile && e.dataType==='source') vworldTileOk=true; });
    map.on('error', e=>{ if(e && e.sourceId==='vworld-base') useFallbackBasemap(); });
    map.on('load', ()=>{ setTimeout(()=>{ if(!vworldTileOk) useFallbackBasemap(); }, 4000); });

    // 지도 준비 헬퍼: MapLibre는 addSource/addLayer 전에 스타일 로드가 끝나야 한다('load'가 보장).
    // isStyleLoaded()는 인라인 스타일에서 조기 true를 반환해 addSource가 "Style is not done loading"로
    // 터질 수 있으므로, 신뢰 가능한 map.loaded()/once('load')만 사용한다.
    function onMapReady(fn){
      const run = () => { try{ map.resize(); }catch(e){} fn(); };
      if (map.loaded()) { run(); return; }
      map.once('load', run);
    }

    onMapReady(async () => {
      [courses, jobs, regions] = await Promise.all([
        fetch('data/courses.json?v=3').then(r=>r.json()),
        fetch('data/jobs.json?v=1').then(r=>r.json()).catch(()=>({})),
        fetch('data/momuri.json?v=3').then(r=>r.json()).catch(()=>([])),
      ]);
      // 시군구 행정경계(선택 지역만 표시)
      try{
        const bounds = await (await fetch('data/region_bounds.geojson?v=1')).json();
        map.addSource('rbounds', { type:'geojson', data:bounds });
        map.addLayer({ id:'rbound-fill', type:'fill', source:'rbounds',
          filter:['==',['get','sigungu'],'__none__'], paint:{ 'fill-color':'#14b8a6','fill-opacity':0.06 } });
        map.addLayer({ id:'rbound-line', type:'line', source:'rbounds',
          filter:['==',['get','sigungu'],'__none__'], paint:{ 'line-color':'#0f766e','line-width':2,'line-dasharray':[2,1.5],'line-opacity':0.85 } });
      }catch(e){}
      const want = qparam('region');
      const idx = courses.findIndex(c => c.sigungu === want || c.region === want);
      cur = idx >= 0 ? idx : 0;
      const sel = document.getElementById('rsel');
      sel.innerHTML = courses.map((c,i)=>`<option value="${i}">${esc(c.region)} · ${esc(c.theme)}</option>`).join('');
      sel.value = cur;
      sel.onchange = e => { cur = +e.target.value; dayIdx = 0; render(); };
      document.querySelectorAll('#period button').forEach(b => b.onclick = () => {
        period = +b.dataset.d;
        document.querySelectorAll('#period button').forEach(x=>x.classList.toggle('on', x===b));
        dayIdx = 0; weekIdx = 0; render();
      });
      document.querySelectorAll('#modes button').forEach(b => b.onclick = () => {
        mode = b.dataset.m;
        document.querySelectorAll('#modes button').forEach(x=>x.classList.toggle('on', x===b));
        render();
      });
      render();
    });

    // 선택 모드의 구간 이동분(대중교통 없으면 자동차 폴백)
    function legMin(leg){ return (mode==='transit' && leg.transit) ? leg.transit.min : leg.car.min; }
    function moveMinOf(day){
      let s = day.legs.reduce((a,l)=>a+legMin(l),0);
      if(day.to_night) s += (mode==='transit' && day.to_night.transit) ? day.to_night.transit.min : day.to_night.car.min;
      return s;
    }
    // 대중교통 스텝 렌더(구간 이동칸 내부)
    function legInner(leg, carLabel){
      if(mode==='transit' && leg.transit){
        const tr = leg.transit;
        const steps = tr.steps.map(st => st.type==='도보'
          ? `<span class="step">🚶 도보 ${st.min}분</span>`
          : `<span class="step ${st.type}">${st.type==='버스'?'🚌':'🚇'} ${esc(st.name)} ${st.min}분</span>`).join('');
        return `<span class="pill">🚌 <b>${tr.min}분</b> · 환승 ${tr.transfers}회</span><div class="steps">${steps}</div>`;
      }
      const rec = (mode==='transit') ? ` <span class="rec">🚗 자동차 권장</span>` : '';
      return `<span class="pill">🚗 <b>${leg.car.min}분</b> · ${carLabel}${leg.car.estimated?' (추정)':''}</span>${rec}`;
    }

    // 이 기간에서 계획에 넣을 '실제 데이터가 있는' 날 수 (데모 코스 상한 내)
    const planDays = c => Math.min(c.days.length, period <= 3 ? period - 0 : c.days.length);

    function render(){
      const c = courses[cur];
      const nd = planDays(c);
      if(dayIdx >= nd) dayIdx = 0;
      const region = regions.find(r => r.sigungu === c.sigungu) || {};
      const job = jobs[c.sigungu] || null;
      curRegion = region;
      curStays = (region.stays || []).filter(s => s.lat && s.lng);

      // 선택 지역 행정경계
      if(map.getLayer('rbound-fill')){
        map.setFilter('rbound-fill', ['==',['get','sigungu'], c.sigungu]);
        map.setFilter('rbound-line', ['==',['get','sigungu'], c.sigungu]);
      }

      const isMonth = period === 30;

      // 요약
      if(isMonth){
        weeks = buildWeeks(region);
        const nPick = weeks.reduce((s,w)=>s+w.picks.length,0);
        document.getElementById('summary').innerHTML =
          `<div>체류<b>한 달+</b></div><div>추천 장소<b>${nPick}곳</b></div><div>월 예상<b>~${estCost().total}만</b></div>`;
      } else {
        const moveTot = c.days.slice(0,nd).reduce((s,d)=>s+moveMinOf(d),0);
        const moveIcon = mode==='transit' ? '🚌' : '🚗';
        document.getElementById('summary').innerHTML =
          `<div>체류<b>${nd-1}박</b></div><div>코스<b>${nd}일</b></div><div>이동 총<b>${moveIcon}${moveTot}분</b></div>`;
      }

      // 단기(일정)용 UI ↔ 한달(주차)용 UI 전환
      document.getElementById('modes').style.display    = isMonth ? 'none' : 'flex';
      document.getElementById('daytabs').style.display  = isMonth ? 'none' : 'flex';
      document.getElementById('timeline').style.display = isMonth ? 'none' : 'block';
      document.getElementById('settleSec').style.display = isMonth ? '' : 'none';
      const banner = document.getElementById('banner');

      if(isMonth){
        banner.style.display='none';
        if(weekIdx >= weeks.length) weekIdx = 0;
        renderMonthMode(c, region);
        renderSettle(c, region);
        drawWeekMap(weeks[weekIdx]);
      } else {
        document.getElementById('monthSec').style.display='none';
        // 대중교통 미제공 배너
        const day0 = c.days[dayIdx];
        const anyTransit = day0.legs.some(l=>l.transit) || (day0.to_night && day0.to_night.transit);
        if(mode==='transit' && !c.has_transit){
          banner.style.display='block';
          banner.innerHTML = anyTransit
            ? '일부 구간만 대중교통 경로가 있어, 없는 구간은 <b>자동차 기준(🚗 자동차 권장)</b>으로 표시합니다.'
            : '🚗 <b>자동차 권장</b> — 이 지역은 대중교통 노선이 드물어 자동차 기준으로 안내합니다.';
        } else banner.style.display='none';
        // Day 탭
        const dt = document.getElementById('daytabs');
        dt.innerHTML = c.days.slice(0,nd).map((d,i)=>
          `<button class="${i===dayIdx?'on':''}" data-i="${i}">Day ${d.day}</button>`).join('');
        dt.querySelectorAll('button[data-i]').forEach(b=> b.onclick=()=>{ dayIdx=+b.dataset.i; render(); });
        renderTimeline(c.days[dayIdx]);
        drawMap(c.days[dayIdx]);
      }
      renderJobs(job, c, region);
      renderStays(region);
      renderStory(c, region, nd);
    }

    // ── 한 달 살기: 주차별 실제 장소 배정 ──
    const KCOL  = { '관광':'#2e79c4','맛집':'#f59e0b','카페':'#e0561a','문화':'#7c5cff','시장':'#14b8a6','체험':'#2fae8f','축제':'#d9534f','숙소':'#7c5cff' };
    const KICON = { '관광':'📍','맛집':'🍽','카페':'☕','문화':'🏛','시장':'🛍','체험':'⛰','축제':'🎉','숙소':'🏠' };
    const take = (arr,a,b)=> (arr||[]).slice(a,b);
    const W = (kind,x)=> ({ kind, title:x.title, addr:x.addr, img:x.img, lat:x.lat, lng:x.lng });

    // 번호 물방울 핀(반투명) — 팁이 좌표를 가리킴
    function numPin(color, n){
      const w=26, h=Math.round(w*32/24);
      return `<svg width="${w}" height="${h}" viewBox="0 0 24 32" style="opacity:.82;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 8.5 12 20 12 20s12-11.5 12-20C24 5.37 18.63 0 12 0z" fill="${color}"/>
        <text x="12" y="16.5" text-anchor="middle" font-size="12" font-weight="800" fill="#fff" font-family="sans-serif">${n}</text></svg>`;
    }
    // 팝업 생성 + 열릴 때 최상단 강제
    function mkPopup(opts, html){
      const p = new maplibregl.Popup(opts).setHTML(html);
      p.on('open', ()=>{ try{ const el=(p.getElement&&p.getElement())||p._container; if(el) el.style.zIndex='10000'; }catch(e){} });
      return p;
    }
    function https(u){ return String(u||'').replace(/^http:\/\//,'https://'); }

    // 장기 숙소 지도 레이어 ──────────────────────────
    // 보라색 🏠 물방울 핀
    function stayPin(){
      return `<svg width="30" height="40" viewBox="0 0 24 32" style="opacity:.9;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 8.5 12 20 12 20s12-11.5 12-20C24 5.37 18.63 0 12 0z" fill="#7c5cff"/>
        <path d="M12 5.6l6.2 5.2v6.4h-3.9v-3.9h-4.6v3.9H5.8v-6.4z" fill="#fff"/></svg>`;
    }
    function stayPopup(s){
      const naver = `https://map.naver.com/v5/search/${encodeURIComponent(s.title||'')}`;
      const kto = `https://korean.visitkorea.or.kr/search/search_list.do?keyword=${encodeURIComponent(s.title||'')}`;
      const img = s.img ? `<img src="${esc(https(s.img))}" alt="" style="width:100%;height:104px;object-fit:cover;border-radius:8px;display:block;margin-bottom:8px;background:#eef1f2" onerror="this.style.display='none'">` : '';
      return `<div style="width:212px">${img}
        <span style="display:inline-block;font-size:9.5px;font-weight:800;color:#fff;background:#7c5cff;padding:1px 9px;border-radius:20px">🏡 장기 숙소</span>
        <div style="font-size:14px;font-weight:800;margin-top:5px;line-height:1.3">${esc(s.title)}</div>
        ${s.addr?`<div style="font-size:11px;color:#7a848a;margin-top:3px;line-height:1.45">${esc(s.addr)}</div>`:''}
        <div style="display:flex;gap:6px;margin-top:9px">
          <a href="${naver}" target="_blank" rel="noopener" style="flex:1;text-align:center;font-size:11.5px;font-weight:700;text-decoration:none;padding:7px 4px;border-radius:8px;background:#eef0ff;color:#5b46d6">네이버 지도</a>
          <a href="${kto}" target="_blank" rel="noopener" style="flex:1;text-align:center;font-size:11.5px;font-weight:700;text-decoration:none;padding:7px 4px;border-radius:8px;background:#e6f7f4;color:#0f766e">구석구석</a>
        </div></div>`;
    }
    function drawStays(){
      stayMarkers.forEach(m=>m.remove()); stayMarkers = [];
      if(!staysOn) return;
      curStays.forEach(s=>{
        const el = document.createElement('div'); el.style.cursor='pointer';
        el.innerHTML = stayPin();
        stayMarkers.push(new maplibregl.Marker({ element:el, anchor:'bottom' })
          .setLngLat([+s.lng, +s.lat])
          .setPopup(mkPopup({ offset:18, maxWidth:'232px' }, stayPopup(s)))
          .addTo(map));
      });
    }
    function toggleStays(){
      if(!curStays.length) return;
      staysOn = !staysOn;
      drawStays();
      if(curRegion) renderStays(curRegion);   // 버튼 상태 갱신
    }

    function buildWeeks(r){
      const S=r.spots,F=r.foods,C=r.cafes,U=r.culture,SH=r.shopping,L=r.leports,FE=r.festivals,ST=r.stays;
      return [
        { theme:'둘러보기', icon:'🗺', desc:'대표 명소·문화유산을 순회하며 지역의 큰 그림을 익히는 주.',
          rhythm:'평일 오전 워케이션 · 오후 대표 명소 / 주말 종일 탐방',
          picks:[...take(S,0,4).map(x=>W('관광',x)), ...take(U,0,1).map(x=>W('문화',x)), ...take(FE,0,1).map(x=>W('축제',x))] },
        { theme:'로컬 깊이', icon:'🏘', desc:'전통시장·카페·골목 맛집으로 관광객에서 생활자로 스며드는 주.',
          rhythm:'평일 단골 카페 워케이션·시장 장보기 / 주말 골목·문화 탐방',
          picks:[...take(SH,0,2).map(x=>W('시장',x)), ...take(C,0,2).map(x=>W('카페',x)), ...take(F,0,2).map(x=>W('맛집',x)), ...take(U,1,2).map(x=>W('문화',x))] },
        { theme:'워케이션·관계', icon:'💻', desc:'작업 거점에서 일하며 체험·이벤트로 지역과 연결되는 주.',
          rhythm:'평일 카페·코워킹 워케이션 / 주말 체험·레포츠·이벤트',
          picks:[...take(C,2,4).map(x=>W('카페',x)), ...take(L,0,3).map(x=>W('체험',x)), ...take(S,4,6).map(x=>W('관광',x))] },
        { theme:'정착 준비', icon:'🔑', desc:'장기 숙소·로컬 일자리를 확정하고 다음 달을 잇는 기반을 만드는 주.',
          rhythm:'평일 일자리 탐색·전입 행정 / 주말 장기 숙소 답사·이웃 인사',
          picks:[...take(ST,0,2).map(x=>W('숙소',x)), ...take(F,2,4).map(x=>W('맛집',x)), ...take(SH,2,3).map(x=>W('시장',x))] },
      ];
    }

    function calHTML(){
      const days=['월','화','수','목','금','토','일'];
      const cal = `<div class="cal">${days.map((d,i)=>{
        const wknd=i>=5, ic=i<5?'💻':(i===5?'🚶':'☕');
        return `<div class="${wknd?'wknd':''}">${d}<b>${ic}</b></div>`;}).join('')}</div>`;
      return cal + `<div class="cal-legend">💻 워케이션(원격근무) · 🚶 나들이 · ☕ 휴식</div>`;
    }

    function renderMonthMode(c, region){
      const sec = document.getElementById('monthSec');
      sec.style.display='';
      const w = weeks[weekIdx];
      const tabs = weeks.map((wk,i)=>`<button class="${i===weekIdx?'on':''}" data-w="${i}">${i+1}주 ${wk.icon}</button>`).join('');
      const picks = w.picks.length ? w.picks.map((p,i)=>`
        <div class="pick" data-i="${i}">
          <span class="pnum">${i+1}</span>
          ${p.img?`<img src="${esc(p.img)}" onerror="this.style.display='none'">`:''}
          <div class="pb"><span class="kd" style="background:${KCOL[p.kind]||'#888'}">${KICON[p.kind]||''} ${p.kind}</span>
          <div class="pt">${esc(p.title)}</div></div>
        </div>`).join('') : '<div class="hint">이 주에 해당하는 카테고리 데이터가 이 지역엔 적어요. 다른 주를 참고하세요.</div>';
      sec.innerHTML = `<h3>🗓 한 달 살기 · 주차별 리듬</h3>
        <div class="hint">TourAPI 실제 장소를 <b>관광 → 로컬 → 워케이션 → 정착</b> 흐름으로 4주에 배분했어요. 주를 눌러보세요(지도도 바뀌어요).</div>
        <div class="wtabs">${tabs}</div>
        <div class="wk-head">${w.icon} ${w.theme}</div>
        <div class="wk-desc">${w.desc}</div>
        ${calHTML()}
        <div class="rhythm">🔁 <b>이번 주 리듬</b> · ${w.rhythm}</div>
        <div class="picks">${picks}</div>`;
      sec.querySelectorAll('.wtabs button').forEach(b=> b.onclick=()=>{ weekIdx=+b.dataset.w; render(); });
      sec.querySelectorAll('.pick').forEach(el=> el.onclick=()=>{
        const p = w.picks[+el.dataset.i];
        if(p && p.lat && p.lng) map.flyTo({ center:[p.lng,p.lat], zoom:14, duration:800 });
      });
    }

    function estCost(){ const stay=55, food=45, transit=10, etc=15; return { stay, food, transit, etc, total:stay+food+transit+etc }; }

    function renderSettle(c, region){
      const sec = document.getElementById('settleSec');
      const nm = c.region.split(' ').pop();
      const k = estCost();
      const nmap = q => `https://map.naver.com/v5/search/${encodeURIComponent(nm+' '+q)}`;
      sec.innerHTML = `<h3>🧾 정착 대시보드</h3>
        <div class="hint">한 달 이상 머물 때 필요한 <b>비용·행정·생활 인프라</b>를 한눈에. (1인 기준 추정)</div>
        <div class="cost">
          <div class="row"><span>장기 숙소(게하·원룸)</span><b>~${k.stay}만</b></div>
          <div class="row"><span>식비(1일 1.5만)</span><b>~${k.food}만</b></div>
          <div class="row"><span>교통</span><b>~${k.transit}만</b></div>
          <div class="row"><span>여가·기타</span><b>~${k.etc}만</b></div>
          <div class="row tot"><span>월 예상 합계</span><b>~${k.total}만원</b></div>
        </div>
        <div class="hint" style="margin-top:6px;font-size:10.5px">※ 지역·숙소 유형·계절에 따라 달라지는 추정치예요.</div>
        <div class="settle" style="margin-top:12px">
          <a href="https://search.naver.com/search.naver?query=${encodeURIComponent(nm+' 한달살기')}" target="_blank" rel="noopener">🏘 한달살기 프로그램</a>
          <a href="${nmap('주민센터')}" target="_blank" rel="noopener">🏛 전입·주민센터</a>
          <a href="${nmap('마트')}" target="_blank" rel="noopener">🛒 생활 마트</a>
          <a href="${nmap('병원')}" target="_blank" rel="noopener">🏥 병원·의료</a>
        </div>
        <div class="hint" style="margin-top:10px;font-size:10.5px">※ 로컬 일자리는 아래 <b>💼</b>, 장기 숙소는 <b>🏡</b> 섹션을 함께 보세요.</div>`;
    }

    function drawWeekMap(w){
      markers.forEach(m=>m.remove()); markers=[];
      if(map.getSource('route')){ try{ map.getSource('route').setData({ type:'Feature', geometry:{ type:'LineString', coordinates:[] }}); }catch(e){} }
      const pts=[];
      (w.picks||[]).forEach((p,i)=>{
        if(!p.lat || !p.lng) return;
        const color = KCOL[p.kind]||'#888';
        const el=document.createElement('div'); el.style.cursor='pointer';
        el.innerHTML = numPin(color, i+1);
        const html = `<div style="display:inline-block;font-size:9.5px;font-weight:800;color:#fff;background:${color};padding:1px 8px;border-radius:20px">${KICON[p.kind]||''} ${p.kind}</div>`
          + `<div style="font-size:13.5px;font-weight:700;margin-top:5px">${esc(p.title)}</div>`
          + (p.addr?`<div style="font-size:11px;color:#7a848a;margin-top:2px">${esc(p.addr)}</div>`:'');
        markers.push(new maplibregl.Marker({ element:el, anchor:'bottom' }).setLngLat([p.lng,p.lat])
          .setPopup(mkPopup({ offset:16, maxWidth:'230px' }, html))
          .addTo(map));
        pts.push([p.lng,p.lat]);
      });
      if(pts.length){
        const lngs=pts.map(p=>p[0]), lats=pts.map(p=>p[1]);
        map.fitBounds([[Math.min(...lngs),Math.min(...lats)],[Math.max(...lngs),Math.max(...lats)]], { padding:70, duration:800, maxZoom:13 });
      }
      drawStays();
    }

    function renderTimeline(day){
      let t = START, html = '';
      const legs = day.legs;
      day.stops.forEach((s,i)=>{
        const arrive=t, depart=t+s.stay;
        html += `<div class="stop">
          <div class="rail"><div class="dot ${s.kind}">${i+1}</div><div class="line"></div></div>
          <div class="body">
            <div class="time">${fmt(arrive)} – ${fmt(depart)}</div>
            <div class="name">${esc(s.name)}<span class="kind ${s.kind}">${s.kind}</span></div>
            ${s.addr?`<div class="addr">${esc(s.addr)}</div>`:''}
            <div class="stay">⏱ 머무름 ${s.stay}분</div>
            ${s.img?`<img src="${esc(s.img)}" onerror="this.style.display='none'">`:''}
          </div></div>`;
        if(i < legs.length){
          html += `<div class="leg"><div class="rail"><div class="line"></div></div><div class="info">${legInner(legs[i], legs[i].car.km+'km')}</div></div>`;
          t = depart + legMin(legs[i]);
        }
      });
      // 야간 숙소
      if(day.night){
        if(day.to_night){
          html += `<div class="leg"><div class="rail"><div class="line"></div></div><div class="info">${legInner(day.to_night, '숙소로 이동')}</div></div>`;
        }
        const n = day.night;
        html += `<div class="stop">
          <div class="rail"><div class="dot 숙박">🏠</div></div>
          <div class="body">
            <div class="time">야간 · 체류</div>
            <div class="name">${esc(n.name)}<span class="kind 숙박">숙박</span></div>
            ${n.addr?`<div class="addr">${esc(n.addr)}</div>`:''}
            <div class="stay">🌙 이 지역에서 하룻밤 — 다음날 로컬 탐색</div>
            ${n.img?`<img src="${esc(n.img)}" onerror="this.style.display='none'">`:''}
          </div></div>`;
      } else {
        html += `<div class="stop"><div class="rail"><div class="dot 숙박">🏠</div></div>
          <div class="body"><div class="name">체크아웃 · 귀가</div>
          <div class="stay">이 지역은 등록 숙소가 적어요 — 아래 장기 숙소·인근 검색을 참고하세요.</div></div></div>`;
      }
      document.getElementById('timeline').innerHTML = html;
    }

    function jobCard(j, local){
      const tags = [j.hire, j.recruitSe].filter(Boolean).map(x=>`<span class="tag">${esc(x)}</span>`).join('');
      const ncs = j.ncs ? `<span class="tag">${esc(String(j.ncs).split(',')[0])}</span>` : '';
      return `<div class="job">
        <div class="tt">${local?'<span class="badge-local">로컬</span> ':''}${esc(j.title)}</div>
        <div class="inst">${esc(j.inst)}</div>
        <div class="meta">${esc(j.rgn||'')} · 채용 ${j.nope||'-'}명 · ~${ymd(j.end)} 마감</div>
        <div>${ncs}${tags}</div>
        ${j.url?`<a class="go" href="${esc(j.url)}" target="_blank" rel="noopener">공고 보기 →</a>`:''}
      </div>`;
    }

    function renderJobs(job, c, region){
      const sec = document.getElementById('jobsSec');
      const ax = region.axes || {};
      const connect = ax.connect ?? 0;
      const outflow = connect < 0;   // 연결성 음수 = 청년 순유출 신호(프록시)
      const local = (job && job.local) || [];
      const sido = (job && job.sido_jobs) || [];
      const wknet = `https://www.work24.go.kr/wk/a/b/1200/retriveDtlEmpSrchList.do?searchClcd=&keyword=${encodeURIComponent(c.sigungu)}`;
      let html = `<h3>💼 로컬 일자리 · 워케이션</h3>
        <div class="hint">장기 체류라면 <b>지역에서 일하며 머무는 것</b>이 핵심. <b>민간·중소기업</b>은 고용24, <b>공공기관</b>은 잡알리오로 나눠 봐요. (아래 카드는 공식 API로 검증된 공공기관 공고)</div>
        <div class="signal">
          <div>문화유산<b>${region.heritage ?? '-'}건</b></div>
          <div>방문 잠재<b>${ax.visit ?? '-'}</b></div>
          <div>청년 유출 신호<b class="${outflow?'warn':''}">${outflow?'있음':'낮음'}</b></div>
        </div>
        <div class="btnrow">
          <a class="lnk p" href="${wknet}" target="_blank" rel="noopener">민간·중소기업 채용 (고용24) →</a>
          ${job?`<a class="lnk" href="${esc(job.deeplink)}" target="_blank" rel="noopener">공공기관 채용 (잡알리오)</a>`:''}
        </div>`;
      if(local.length){
        html += `<div class="hint" style="margin:12px 0 0">🎯 <b>지역 밀착 공고</b>(시군구 매칭)</div>` + local.slice(0,3).map(j=>jobCard(j,true)).join('');
      }
      if(sido.length){
        html += `<div class="hint" style="margin:12px 0 0">🏛 인근(시·도) 공공기관 공고</div>` + sido.slice(0,3).map(j=>jobCard(j,false)).join('');
      }
      if(!local.length && !sido.length){
        html += `<div class="empty">현재 진행 중인 공공기관 공고가 없어요. 위 딥링크에서 지역 중소기업 채용을 확인하세요.</div>`;
      }
      html += `<div class="hint" style="margin-top:10px;font-size:10.5px">※ 지방 중소기업 실물 채용은 딥링크로, 신뢰성 있는 공공기관 채용은 공식 API(잡알리오)로 제공합니다. 구인배수 등 인력난 지표는 KOSIS 연동 예정.</div>`;
      sec.innerHTML = html;
    }

    function renderStays(region){
      const sec = document.getElementById('staySec');
      const stays = (region.stays || []);
      const mappable = stays.filter(s => s.lat && s.lng);
      let html = `<h3>🏡 장기 숙소</h3>
        <div class="hint">한달살기·워케이션용 숙소(게스트하우스·펜션 등). 장기 투숙은 숙소에 직접 문의를 권장합니다.</div>`;
      if(mappable.length){
        html += `<button class="staytoggle${staysOn?' on':''}" onclick="toggleStays()">${staysOn?'🗺 지도에서 숙소 숨기기':'🗺 지도에 숙소 '+mappable.length+'곳 표시'}</button>`;
      }
      if(stays.length){
        html += stays.slice(0,4).map(s=>`<div class="stay-card">
          ${s.img?`<img src="${esc(s.img)}" onerror="this.style.display='none'">`:'<img>'}
          <div><div class="t">${esc(s.title)}</div><div class="a">${esc(s.addr||'')}</div></div>
        </div>`).join('');
      } else {
        html += `<div class="empty">등록된 숙소가 적은 지역이에요. 인근 시·군 숙소 또는 지자체 한달살기 프로그램을 활용하세요.</div>`;
      }
      sec.innerHTML = html;
    }

    function renderStory(c, region, nd){
      const sec = document.getElementById('storySec');
      const ax = region.axes || {};
      const nights = period===30 ? 27 : (nd-1);
      const est = nights * 1;   // 1인 체류 → 체류일수만큼 생활인구 기여(데모 단순화)
      sec.innerHTML = `<h3>🌱 머물면 생기는 것 — 생활인구</h3>
        <p>${esc(c.region)}은(는) 문화유산 ${region.heritage ?? '-'}건의 매력에도 방문이 <b>하루에 그치기 쉬운</b> 곳이에요. 며칠 머물면 관광객이 아니라 <b>생활인구</b>가 됩니다 — 지역 상권·숙박·일자리에 실제 소비가 남습니다.</p>
        <div class="kpi">
          <div>쇠퇴지수<b>${region.composite ?? '-'}</b></div>
          <div>이번 체류<b>${period===30?'한 달+':(nd)+'일'}</b></div>
          <div>생활인구 기여<b>+${est}일</b></div>
        </div>
        <p style="font-size:11px;opacity:.85;margin-top:6px">#체류형관광 #워케이션 #한달살기 #2030청년 #로컬일자리 #생활인구</p>`;
    }

    function drawMap(day){
      markers.forEach(m=>m.remove()); markers = [];
      let path = day.legs.flatMap(l => l.car.path);
      if(day.to_night) path = path.concat(day.to_night.car.path);
      const gj = { type:'Feature', geometry:{ type:'LineString', coordinates:path } };
      if(map.getSource('route')) map.getSource('route').setData(gj);
      else {
        map.addSource('route',{ type:'geojson', data:gj });
        map.addLayer({ id:'route-line', type:'line', source:'route',
          paint:{ 'line-color':'#14b8a6','line-width':4,'line-opacity':0.85 },
          layout:{ 'line-cap':'round','line-join':'round' }});
      }
      const pts = [];
      day.stops.forEach((s,i)=>{
        const el = document.createElement('div');
        el.className='nm'; el.style.background=COLOR[s.kind];
        el.innerHTML=`<span>${i+1}</span>`;
        markers.push(new maplibregl.Marker({ element:el }).setLngLat([s.lng,s.lat]).addTo(map));
        pts.push([s.lng,s.lat]);
      });
      if(day.night){
        const el = document.createElement('div');
        el.className='nm'; el.style.background=COLOR['숙박']; el.style.fontSize='14px';
        el.innerHTML='🏠';
        markers.push(new maplibregl.Marker({ element:el }).setLngLat([day.night.lng,day.night.lat]).addTo(map));
        pts.push([day.night.lng,day.night.lat]);
      }
      const lngs = pts.map(p=>p[0]), lats = pts.map(p=>p[1]);
      map.fitBounds([[Math.min(...lngs),Math.min(...lats)],[Math.max(...lngs),Math.max(...lats)]],
        { padding:70, duration:800, maxZoom:13 });
      drawStays();
    }
  </script>
</body>

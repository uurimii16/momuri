<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>머무리 · 숨은 매력지</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    :root{ --brand:#14b8a6; --brand-d:#0f766e; --amber:#f59e0b; --ink:#26343a; --muted:#6b7684; --line:#e7ebec; --soft:#f5f8f7; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body{ font-family:'Pretendard',-apple-system,sans-serif; color:var(--ink); }
    .nav{ height:56px; background:#fff; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:22px; padding:0 24px; }
    .brand{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:18px; color:var(--brand-d); text-decoration:none; }
    .nav a{ color:var(--muted); text-decoration:none; font-size:14px; }
    .nav a.active,.nav a:hover{ color:var(--brand-d); }
    .spacer{ flex:1; }
    .kto{ font-size:11px; color:#94a0a8; }
    .kto b{ color:var(--brand-d); }
    #app{ display:flex; height:calc(100vh - 56px); }
    #side{ width:388px; background:var(--soft); overflow-y:auto; padding:24px; border-right:1px solid var(--line); }
    #side h1{ font-size:26px; letter-spacing:-.5px; }
    #side .sub{ font-size:14px; color:var(--muted); margin:10px 0 20px; line-height:1.65; }
    .card{ background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px 16px; margin-bottom:12px; cursor:pointer; transition:.15s; }
    .card:hover,.card.active{ border-color:var(--brand); box-shadow:0 4px 16px rgba(20,184,166,.15); }
    .card .rank{ font-size:12px; color:var(--brand-d); font-weight:700; }
    .card .name{ font-size:19px; font-weight:800; margin:3px 0 7px; letter-spacing:-.3px; }
    .card .meta{ font-size:13px; color:var(--muted); }
    .card .bars{ display:flex; gap:7px; margin-top:11px; }
    .bar{ flex:1; text-align:center; font-size:11px; color:#9aa4ab; background:var(--soft); border-radius:8px; padding:6px 2px; }
    .bar b{ display:block; font-size:15px; color:var(--ink); margin-top:1px; }

    #detail{ position:absolute; right:16px; top:16px; width:330px; max-height:calc(100vh - 88px); overflow-y:auto; background:#fff; border-radius:16px; box-shadow:0 8px 30px rgba(0,0,0,.16); padding:18px; display:none; }
    #detail h2{ font-size:21px; }
    #detail .tag{ display:inline-block; font-size:11px; background:#e6f7f4; color:var(--brand-d); padding:3px 9px; border-radius:20px; margin:7px 0; }
    #detail h3{ font-size:13.5px; margin:15px 0 7px; color:var(--brand-d); }
    #detail ul{ list-style:none; }
    #detail li{ font-size:13.5px; padding:7px 8px; border-radius:8px; border-bottom:1px solid #f0efea; cursor:pointer; display:flex; align-items:center; gap:7px; transition:.12s; }
    #detail li:hover{ background:var(--soft); color:var(--brand-d); }
    #detail li .ic{ width:8px; height:8px; border-radius:50%; flex:none; }
    #detail li .go{ margin-left:auto; color:#c3ccd0; font-size:12px; }
    #detail li:hover .go{ color:var(--brand); }
    #detail .herul{ max-height:196px; overflow-y:auto; margin-top:2px; border:1px solid #f0efea; border-radius:10px; }
    #detail .herul li{ border-bottom:1px solid #f4f2ec; }
    #detail .hbadge{ font-size:9.5px; font-weight:800; color:#fff; background:#9a6b3f; border-radius:20px; padding:1.5px 6px; flex:none; }
    #detail .close{ float:right; cursor:pointer; color:#aab; font-size:22px; }
    #detail .idx{ display:flex; gap:6px; margin-top:12px; }
    #detail .idx div{ flex:1; background:var(--soft); border-radius:8px; padding:8px 3px; text-align:center; font-size:10.5px; color:var(--muted); }
    #detail .idx b{ display:block; font-size:15px; color:#e0561a; margin-top:2px; }
    #detail .dbtn{ display:block; width:100%; text-align:center; margin-top:9px; border:none; border-radius:9px; padding:11px; font-weight:700; font-size:13.5px; cursor:pointer; }
    #detail .dbtn.p{ background:var(--brand); color:#fff; }
    #detail .dbtn.p:hover{ background:var(--brand-d); }
    #detail .dbtn.s{ background:#fff; border:1px solid var(--brand); color:var(--brand-d); }
    #detail .dbtn.s:hover{ background:#eefaf7; }

    #map{ flex:1; position:relative; }

    /* ── 숨은 매력지: 평소엔 작은 점, 선택하면 사진 카드 ── */
    .gem-pin{ display:inline-flex; flex-direction:column; align-items:center; width:max-content; cursor:pointer; }
    .gem-pin .gp-label{ font-size:11.5px; font-weight:800; color:var(--brand-d); background:rgba(255,255,255,.92); border-radius:20px; padding:2px 9px; margin-bottom:2px; white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,.15); }

    .gem-card{ display:inline-flex; align-items:center; gap:10px; width:max-content; max-width:262px; background:#fff; border:2px solid var(--brand); border-radius:14px; padding:7px 14px 7px 7px; box-shadow:0 6px 18px rgba(0,0,0,.16); cursor:pointer; position:relative; }
    .gem-card::after{ content:''; position:absolute; left:50%; bottom:-8px; transform:translateX(-50%); width:0; height:0; border:8px solid transparent; border-bottom:0; border-top-color:var(--brand); }
    .gem-card img{ width:44px; height:44px; border-radius:9px; object-fit:cover; background:#e6f7f4; flex:none; display:block; }
    .gem-card .gt{ line-height:1.2; }
    .gem-card .gt .k{ display:inline-block; font-size:9.5px; font-weight:800; color:#fff; background:var(--brand); border-radius:20px; padding:1.5px 8px; letter-spacing:.2px; }
    .gem-card .gt .n{ display:block; font-size:15px; font-weight:800; color:var(--ink); margin-top:4px; letter-spacing:-.2px; white-space:nowrap; }

    /* ── 관광지/맛집 마커: 반투명 핀(📍) + 지명 라벨 위 ── */
    .poi-marker{ display:flex; flex-direction:column; align-items:center; cursor:pointer; }
    .poi-marker .poi-label{ font-size:11px; font-weight:700; color:var(--ink); background:rgba(255,255,255,.9); border-radius:20px; padding:1.5px 8px; margin-bottom:2px; white-space:nowrap; box-shadow:0 1px 4px rgba(0,0,0,.13); }

    /* 공통 핀(SVG) — 색·투명도 유지, 팁이 좌표를 가리킴 */
    .mk-pin{ opacity:.72; filter:drop-shadow(0 2px 3px rgba(0,0,0,.28)); transition:transform .12s, opacity .12s; transform-origin:50% 100%; display:block; }
    .poi-marker:hover .mk-pin, .gem-pin:hover .mk-pin{ opacity:1; transform:scale(1.15); }
    .poi-marker:hover .poi-label, .gem-pin:hover .gp-label{ color:var(--brand-d); }
    .gem-pin .mk-pin{ opacity:.85; }

    /* ── 문화유산 마커: 사적지(기념물) 모양 SVG, 배경 없음 ── */
    .her-marker{ cursor:pointer; transition:transform .12s; transform-origin:50% 100%; line-height:0; }
    .her-ic{ filter:drop-shadow(0 1px 2px rgba(0,0,0,.45)); display:block; }
    .her-marker:hover{ transform:scale(1.25); }

    /* POI 팝업 */
    .poi-pop{ width:214px; }
    .poi-pop img{ width:100%; height:112px; object-fit:cover; border-radius:8px; display:block; margin-bottom:8px; background:#eef1f2; }
    .poi-pop .cat{ display:inline-block; font-size:10px; font-weight:700; padding:2px 9px; border-radius:20px; color:#fff; margin-bottom:5px; }
    .poi-pop .cat.tour{ background:#38bdf8; }
    .poi-pop .cat.food{ background:#f472b6; }
    .poi-pop .cat.her{ background:#9a6b3f; }
    .poi-pop .ttl{ font-size:15px; font-weight:800; color:var(--ink); line-height:1.3; }
    .poi-pop .addr{ font-size:11.5px; color:var(--muted); margin-top:4px; line-height:1.45; }
    .poi-pop .links{ display:flex; gap:6px; margin-top:10px; }
    .poi-pop .links a{ flex:1; text-align:center; font-size:11.5px; font-weight:700; text-decoration:none; padding:8px 4px; border-radius:8px; }
    .poi-pop .links a.kto{ background:#e6f7f4; color:var(--brand-d); }
    .poi-pop .links a.kto:hover{ background:#d2f0ea; }
    .poi-pop .links a.naver{ background:#eaf6ea; color:#199319; }
    .poi-pop .links a.naver:hover{ background:#d8efd8; }
    .maplibregl-popup-content,.routogl-popup-content{ border-radius:12px; padding:12px 12px 13px; box-shadow:0 8px 30px rgba(0,0,0,.18); }
    /* 팝업을 모든 마커(카드·핀) 위 최상단으로 — 클래스명 불확실 대비 3종 + !important */
    .maplibregl-popup,.mapboxgl-popup,.routogl-popup{ z-index:10000 !important; }
    .poi-pop a{ outline:none; -webkit-tap-highlight-color:transparent; }

    /* 마커 색상 범례 */
    .mlegend{ position:absolute; left:14px; bottom:16px; z-index:5; background:rgba(255,255,255,.96); border-radius:12px; padding:11px 13px; box-shadow:0 3px 14px rgba(0,0,0,.13); font-size:12px; }
    .mlegend h4{ font-size:11.5px; margin-bottom:8px; color:var(--ink); }
    .mlegend .row{ display:flex; align-items:center; gap:8px; margin:5px 0; color:#48555b; }
    .mlegend .row .mk-pin, .mlegend .row .her-ic{ flex:none; }
  </style>
</head>
<body>
  <div class="nav">
    <a class="brand" href="../index.html"><svg width="24" height="24" viewBox="0 0 32 32" fill="none"><path d="M16 3c-5.5 0-10 4.3-10 10 0 7.2 10 16 10 16s10-8.8 10-16c0-5.7-4.5-10-10-10z" fill="#14b8a6"/><path d="M16 9l6 5v7h-3.9v-4.4h-4.2V21H10v-7z" fill="#fff"/></svg>머무리</a>
    <a href="../index.html">홈</a>
    <a href="momuri.html" class="active">숨은 매력지</a>
    <a href="course.html">하루 코스</a>
    <a href="stay.html">체류 플래너</a>
    <a href="decline-map.html">쇠퇴지수 지도</a>
    <a href="methodology.html">지표 방법론</a>
    <span class="spacer"></span>
    <span class="kto">데이터 · <b>한국관광공사 TourAPI</b></span>
  </div>
  <div id="app">
    <aside id="side">
      <h1>숨은 매력지</h1>
      <p class="sub"><b>숨은 매력지</b> = 관광은 쇠퇴했지만(방문·재방문·동선 소외) <b>살릴 자원(문화유산 등)은 많은데 안 알려진</b> 소도시. 복합 관광쇠퇴지수 × 문화유산 밀도로 골랐어요. 카드나 지도의 <b style="color:#0f766e;">초록 매력지 카드</b>를 누르면 한국관광공사 TourAPI 실제 관광지·맛집이 지도에 뜹니다.</p>
      <div id="list"></div>
    </aside>
    <div id="map"></div>
  </div>
  <section id="detail"></section>

  <script>
    // ── 베이스맵: VWorld(국토교통부) 기본 + 실패 시 Carto 무키 폴백 자동 전환(tourgo와 동일) ──
    const VWORLD_KEY = 'C666A4B9-67F8-3D8B-BC1A-66CB6A90ADC3';
    const VW = (layer,ext) => `https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/${layer}/{z}/{y}/{x}.${ext}`;
    const FALLBACK_TILES = ['https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png','https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png','https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'];
    const BASE_STYLE = { version:8, sources:{
      'vworld-base':{ type:'raster', tiles:[VW('Base','png')], tileSize:256, maxzoom:19, attribution:'© VWorld (국토교통부)' },
      'fallback-base':{ type:'raster', tiles:FALLBACK_TILES, tileSize:256, maxzoom:19, attribution:'© OpenStreetMap contributors © CARTO' }
    }, layers:[
      { id:'vworld-base', type:'raster', source:'vworld-base' },
      { id:'fallback-base', type:'raster', source:'fallback-base', layout:{ visibility:'none' } }
    ]};
    const map = new maplibregl.Map({ container:'map', style:BASE_STYLE, center:[127.7,36.3], zoom:7 });
    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl(), 'bottom-right');
    // VWorld 타일 실패(에러 또는 4초 내 무타일) 시 Carto 폴백으로 자동 전환(tourgo와 동일)
    let basemapSwitched=false, vworldTileOk=false;
    function useFallbackBasemap(){
      if(basemapSwitched || !map.getLayer('fallback-base')) return;
      basemapSwitched=true;
      try{ map.setLayoutProperty('fallback-base','visibility','visible'); map.setLayoutProperty('vworld-base','visibility','none'); }catch(e){}
    }
    map.on('data', e=>{ if(e && e.sourceId==='vworld-base' && e.tile && e.dataType==='source') vworldTileOk=true; });
    map.on('error', e=>{ if(e && e.sourceId==='vworld-base') useFallbackBasemap(); });
    map.on('load', ()=>{ setTimeout(()=>{ if(!vworldTileOk) useFallbackBasemap(); }, 4000); });
    const listEl = document.getElementById('list');
    const detailEl = document.getElementById('detail');
    let regions = [], gemMarkers = [], poiMarkers = [], curPois = [];
    let HERI = {}, heriMarkers = [], curHeri = [], heriOn = false;

    const COLOR = { region:'#14b8a6', tour:'#38bdf8', food:'#f472b6', her:'#9a6b3f' };

    // 지도 준비 헬퍼: MapLibre는 addSource/addLayer 전에 스타일 로드가 끝나야 한다('load'가 보장).
    // isStyleLoaded()는 인라인 스타일에서 조기 true를 반환해 addSource가 "Style is not done loading"로
    // 터질 수 있으므로, 신뢰 가능한 map.loaded()/once('load')만 사용한다.
    function onMapReady(fn){
      const run = () => { try{ map.resize(); }catch(e){} fn(); };
      if (map.loaded()) { run(); return; }
      map.once('load', run);
    }

    onMapReady(async () => {
      regions = await (await fetch(`data/momuri.json?v=${Date.now()}`,{cache:'no-store'})).json();
      try{ HERI = await (await fetch(`data/heritage.json?v=${Date.now()}`,{cache:'no-store'})).json(); }catch(e){ HERI = {}; }
      // 시군구 행정경계(선택 지역만 표시)
      try{
        const bounds = await (await fetch(`data/region_bounds.geojson?v=1`)).json();
        map.addSource('rbounds', { type:'geojson', data:bounds });
        map.addLayer({ id:'rbound-fill', type:'fill', source:'rbounds',
          filter:['==',['get','sigungu'],'__none__'],
          paint:{ 'fill-color':'#14b8a6', 'fill-opacity':0.07 } });
        map.addLayer({ id:'rbound-line', type:'line', source:'rbounds',
          filter:['==',['get','sigungu'],'__none__'],
          paint:{ 'line-color':'#0f766e', 'line-width':2.5, 'line-dasharray':[2,1.5], 'line-opacity':0.9 } });
      }catch(e){}
      renderList();
      addLegend();
      regions.forEach((r,i)=>{
        const el = document.createElement('div');
        renderGem(el, r, false);
        el.addEventListener('click', ()=> selectRegion(i));
        const m = new maplibregl.Marker({ element:el, anchor:'bottom' }).setLngLat([r.lng,r.lat]).addTo(map);
        gemMarkers.push(m);
      });
    });

    function https(u){ return String(u||'').replace(/^http:\/\//,'https://'); }
    function thumbOf(r){ return https((r.spots||[]).concat(r.foods||[]).find(s=>s.img)?.img || ''); }
    // 평소=작은 점, 선택=사진 카드
    // (className 통째 교체 금지 — 지도 라이브러리가 붙인 마커 클래스가 지워져 레이아웃 깨짐)
    function renderGem(el, r, sel){
      el.classList.toggle('gem-card', sel);
      el.classList.toggle('gem-pin', !sel);
      el.style.zIndex = sel ? '5' : '';   // 카드는 낮게 — POI 핀이 위로
      if(sel){
        const t = thumbOf(r);
        const img = t ? `<img src="${esc(t)}" alt="" onerror="this.style.display='none'">` : '';
        el.innerHTML = `${img}<span class="gt"><span class="k">숨은 매력지</span><span class="n">${esc(r.region)}</span></span>`;
      } else {
        el.innerHTML = `<span class="gp-label">${esc(r.region)}</span>${pinSVG(COLOR.region, 24)}`;
      }
    }

    // 외부 관광정보 바로가기(구석구석·네이버) — 이름에서 검색어 생성
    function extLinks(name){
      const kw = String(name||'').trim();
      const kto = `https://korean.visitkorea.or.kr/search/search_list.do?keyword=${encodeURIComponent(kw)}`;
      const naver = `https://search.naver.com/search.naver?query=${encodeURIComponent(kw + ' 여행')}`;
      return `<div class="links">
        <a class="kto" href="${kto}" target="_blank" rel="noopener noreferrer">구석구석</a>
        <a class="naver" href="${naver}" target="_blank" rel="noopener noreferrer">네이버 검색</a>
      </div>`;
    }

    function addLegend(){
      const el = document.createElement('div');
      el.className = 'mlegend';
      el.innerHTML = `<h4>지도 안내</h4>
        <div class="row">${pinSVG(COLOR.region,14)}숨은 매력지</div>
        <div class="row">${pinSVG(COLOR.tour,14)}관광지 (TourAPI)</div>
        <div class="row">${pinSVG(COLOR.food,14)}맛집 (TourAPI)</div>
        <div class="row">${heriIconSVG(15)}문화유산 (국가유산청)</div>
        <div style="margin-top:7px;color:#9aa4ab;font-size:11px;">매력지 핀을 누르면 관광지·맛집이 떠요</div>`;
      document.getElementById('map').appendChild(el);
    }

    function esc(s){ return String(s ?? '').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

    // 팝업 생성 + 열릴 때 자기 요소를 최상단으로 강제(라이브러리 클래스명과 무관하게 확실히)
    function mkPopup(opts, html){
      const p = new maplibregl.Popup(opts).setHTML(html);
      p.on('open', ()=>{ try{ const el = (p.getElement && p.getElement()) || p._container; if(el) el.style.zIndex = '10000'; }catch(e){} });
      return p;
    }

    // 지도 핀(SVG): 둥근 머리 + 아래로 뾰족한 팁 + 흰 속점
    function pinSVG(color, w){
      const h = Math.round(w*32/24);
      return `<svg class="mk-pin" width="${w}" height="${h}" viewBox="0 0 24 32" style="fill:${color}">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 8.5 12 20 12 20s12-11.5 12-20C24 5.37 18.63 0 12 0z"/>
        <circle cx="12" cy="12" r="4.4" fill="#fff"/></svg>`;
    }
    // 문화유산 아이콘(사적지·기념물 실루엣): 지붕+기둥+기단
    function heriIconSVG(w){
      return `<svg class="her-ic" width="${w}" height="${w}" viewBox="0 0 24 24" style="fill:#9a6b3f">
        <path d="M12 2 2 7.2V9h20V7.2z"/>
        <rect x="3.3" y="10" width="2.4" height="7.4"/>
        <rect x="8" y="10" width="2.4" height="7.4"/>
        <rect x="13.6" y="10" width="2.4" height="7.4"/>
        <rect x="18.3" y="10" width="2.4" height="7.4"/>
        <rect x="2.2" y="18.4" width="19.6" height="2.7"/></svg>`;
    }

    function poiPopup(s){
      const isFood = s.kind === '맛집';
      const img = s.img ? `<img src="${esc(https(s.img))}" alt="" onerror="this.style.display='none'">` : '';
      return `<div class="poi-pop">${img}
        <span class="cat ${isFood?'food':'tour'}">${isFood?'맛집':'관광지'}</span>
        <div class="ttl">${esc(s.title)}</div>
        ${s.addr?`<div class="addr">${esc(s.addr)}</div>`:''}
        ${extLinks(s.title)}</div>`;
    }

    function poiMarkerHTML(s){
      const color = s.kind==='맛집'?COLOR.food:COLOR.tour;
      return `<span class="poi-label">${esc(s.title)}</span>${pinSVG(color, 20)}`;
    }

    function renderList(){
      listEl.innerHTML = regions.map((r,i)=>`
        <div class="card" data-i="${i}">
          <div class="rank">#${i+1} · ${r.theme}</div>
          <div class="name">${r.region}</div>
          <div class="meta">문화유산 ${r.heritage}건 · 관광지 ${r.spots.length} · 맛집 ${r.foods.length}</div>
          <div class="bars"><div class="bar">쇠퇴<b>${r.composite}</b></div><div class="bar">숨은점수<b>${r.hidden_score}</b></div></div>
        </div>`).join('');
      listEl.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>selectRegion(+c.dataset.i)));
    }

    function selectRegion(i){
      const r = regions[i];
      document.querySelectorAll('.card').forEach((c,j)=>c.classList.toggle('active',j===i));
      gemMarkers.forEach((m,j)=> renderGem(m.getElement(), regions[j], j===i));
      // 선택 지역 행정경계 표시
      if(map.getLayer('rbound-fill')){
        map.setFilter('rbound-fill', ['==',['get','sigungu'], r.sigungu]);
        map.setFilter('rbound-line', ['==',['get','sigungu'], r.sigungu]);
      }

      // 관광지·맛집 마커 갱신
      poiMarkers.forEach(m=>m.remove()); poiMarkers=[];
      heriMarkers.forEach(m=>m.remove()); heriMarkers=[]; heriOn=false;
      curHeri = HERI[r.sigungu] || [];
      curPois = [...r.spots.map(s=>({...s,kind:'관광지'})), ...r.foods.map(s=>({...s,kind:'맛집'}))];
      curPois.forEach(s=>{
        const el = document.createElement('div');
        el.className = 'poi-marker';
        el.innerHTML = poiMarkerHTML(s);
        const m = new maplibregl.Marker({ element:el, anchor:'bottom' })
          .setLngLat([s.lng,s.lat])
          .setPopup(mkPopup({ offset:20, maxWidth:'240px' }, poiPopup(s)))
          .addTo(map);
        poiMarkers.push(m);
      });
      map.flyTo({ center:[r.lng,r.lat], zoom:11, duration:800 });
      liftMarkers();
      map.once('moveend', liftMarkers);   // 지도 라이브러리가 이동 후 z-index 재정렬해도 다시 올림

      // 상세 패널
      detailEl.style.display='block';
      detailEl.innerHTML = `
        <span class="close" onclick="document.getElementById('detail').style.display='none'">×</span>
        <h2>${esc(r.region)}</h2>
        <div class="tag">${esc(r.segment)}</div>
        <div class="idx"><div>방문쇠퇴<b>${r.axes.visit}</b></div><div>매력쇠퇴<b>${r.axes.attract}</b></div><div>연결소외<b>${r.axes.connect}</b></div></div>
        <h3>관광지 (TourAPI) · ${r.spots.length}</h3>
        <ul>${r.spots.map((s,k)=>poiLi(s,k)).join('')||'<li style="cursor:default;color:#9aa">표시할 관광지 없음</li>'}</ul>
        <h3>맛집 (TourAPI) · ${r.foods.length}</h3>
        <ul>${r.foods.map((s,k)=>poiLi(s,r.spots.length+k)).join('')||'<li style="cursor:default;color:#9aa">표시할 맛집 없음</li>'}</ul>
        <h3>🏛 문화유산 · 국가지정 ${curHeri.length}건 <span style="font-weight:400;color:#9aa4ab;font-size:11px">(출처 국가유산청)</span></h3>
        ${curHeri.length ? `<button class="dbtn s" id="heriBtn" onclick="toggleHeri()">지도에 유산 ${curHeri.length}곳 표시</button>
        <ul class="herul">${curHeri.map((s,k)=>heriLi(s,k)).join('')}</ul>` : '<div style="font-size:12.5px;color:#9aa4ab;padding:4px 2px">지도 표시 가능한 국가지정 유산이 없어요.</div>'}
        <button class="dbtn p" onclick="location.href='course.html?region=${encodeURIComponent(r.sigungu)}'">🗓 하루 코스 계획 보기 →</button>
        <button class="dbtn s" onclick="location.href='stay.html?region=${encodeURIComponent(r.sigungu)}'">🏡 며칠 머무르기(체류·일자리) →</button>`;
      detailEl.scrollTop = 0;
    }

    function poiLi(s, idx){
      const isFood = s.kind==='맛집';
      const color = isFood?COLOR.food:COLOR.tour;
      return `<li onclick="focusPoi(${idx})"><span class="ic" style="background:${color}"></span>${esc(s.title)}<span class="go">지도 ▸</span></li>`;
    }

    // 관광지·맛집(1000)·문화유산(900) 핀을 매력지 카드(5) 위로 강제
    function liftMarkers(){
      poiMarkers.forEach(m=> m.getElement().style.zIndex = '1000');
      heriMarkers.forEach(m=> m.getElement().style.zIndex = '900');
    }

    // 상세 리스트 클릭 → 해당 핀으로 이동 + 팝업 열기
    function focusPoi(idx){
      const s = curPois[idx]; const m = poiMarkers[idx];
      if(!s || !m) return;
      map.flyTo({ center:[s.lng,s.lat], zoom:13.5, duration:800 });
      poiMarkers.forEach(mk=>{ if(mk.getPopup()?.isOpen()) mk.togglePopup(); });
      m.togglePopup();
    }

    // ── 문화유산 ──
    function heriLi(s, k){
      return `<li onclick="focusHeri(${k})"><span class="hbadge">${esc(s.k)}</span>${esc(s.n)}<span class="go">지도 ▸</span></li>`;
    }
    function heriPopup(s){
      return `<div class="poi-pop">
        <span class="cat her">${esc(s.k)}</span>
        <div class="ttl">${esc(s.n)}</div>
        <div class="addr">국가유산청 지정유산</div>
        ${extLinks(s.n)}</div>`;
    }
    function buildHeriMarkers(){
      if(heriMarkers.length) return;
      curHeri.forEach(s=>{
        const el = document.createElement('div');
        el.className = 'her-marker';
        el.innerHTML = heriIconSVG(22);
        const m = new maplibregl.Marker({ element:el, anchor:'bottom' })
          .setLngLat([s.lo,s.la])
          .setPopup(mkPopup({ offset:14, maxWidth:'240px' }, heriPopup(s)))
          .addTo(map);
        heriMarkers.push(m);
      });
      liftMarkers();
    }
    function toggleHeri(){
      const btn = document.getElementById('heriBtn');
      if(heriOn){
        heriMarkers.forEach(m=>m.remove()); heriMarkers=[]; heriOn=false;
        if(btn) btn.textContent = `지도에 유산 ${curHeri.length}곳 표시`;
      } else {
        buildHeriMarkers(); heriOn=true;
        if(btn) btn.textContent = `유산 ${curHeri.length}곳 숨기기`;
      }
    }
    function focusHeri(k){
      const s = curHeri[k];
      if(!s) return;
      if(!heriOn) toggleHeri();
      const m = heriMarkers[k];
      map.flyTo({ center:[s.lo,s.la], zoom:14, duration:800 });
      heriMarkers.forEach(mk=>{ if(mk.getPopup()?.isOpen()) mk.togglePopup(); });
      if(m) m.togglePopup();
    }
  </script>
</body>
</html>
